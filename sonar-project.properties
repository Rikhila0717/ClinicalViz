# sonar.projectKey and sonar.organization are passed via CI secrets
# (SONAR_PROJECT_KEY and SONAR_ORGANIZATION in GitHub Actions)

sonar.projectName=ClinicalTrials.gov Query-to-Visualization Agent
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=app/
sonar.tests=tests/
sonar.python.version=3.11

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Test execution report generated by pytest --junitxml
sonar.python.xunit.reportPath=test-results.xml

# Exclude non-source files from analysis
sonar.exclusions=**/__pycache__/**,examples.py
